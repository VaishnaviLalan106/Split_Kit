<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SplitKit 🍕 | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: "Outfit", sans-serif; background: #f0f4f8; color: #2d3748; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); transition: all 0.3s ease; }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .whatsapp-btn { background: #25d366; color: white; transition: all 0.3s ease; }
        
        @keyframes slidePop {
            0% { transform: translateY(20px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-card { animation: slidePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .settled { opacity: 0.4; transform: scale(0.95); pointer-events: none; transition: all 0.5s ease; filter: grayscale(1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="flex flex-col items-center mb-10">
        <div class="w-full max-w-6xl flex justify-between items-center mb-6">
            <div class="text-left">
                <h1 class="text-4xl font-extrabold tracking-tight text-[#4a5568]">SplitKit 🍕</h1>
                <p class="text-slate-500">Smart Settlements, No Stress.</p>
            </div>
        </div>

        <div class="w-full max-w-sm glass-card p-4 text-center border-b-4 border-purple-500 animate-card">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Unsettled Amount 💰</h3>
            <p id="totalPendingDisplay" class="text-3xl font-black text-purple-600">₹0.00</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-6">
            <section class="glass-card p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><span>💰</span> Setup Bill</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Expense Title</label>
                        <input type="text" id="expenseTitle" placeholder="e.g. Pizza Night 🍕" class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-purple-400 font-semibold" />
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Total Bill Amount</label>
                        <input type="number" id="billAmount" placeholder="₹0.00" class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none focus:ring-2 focus:ring-purple-400 text-lg font-semibold" />
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Total Friends (n)</label>
                            <input type="number" id="friendCount" min="2" value="2" oninput="updateFriendInputs()" class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none font-bold text-purple-600" />
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Category</label>
                            <select id="category" class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none">
                                <option value="🍔">Food</option>
                                <option value="🎬">Movie</option>
                                <option value="🚗">Travel</option>
                                <option value="🎁">Gift</option>
                            </select>
                        </div>
                    </div>

                    <div id="friendsContainer" class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Friend Names</label>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase ml-1">Who Paid?</label>
                        <select id="whoPaid" class="w-full p-4 rounded-xl bg-slate-100 border-none outline-none font-bold text-purple-600">
                        </select>
                    </div>

                    <button onclick="splitBill()" class="w-full p-4 rounded-xl text-white font-bold btn-gradient shadow-lg">Calculate Split ✨</button>
                </div>
            </section>

            <section id="resultCard" class="glass-card p-6 bg-purple-50 border-purple-100">
                <h3 class="text-sm font-bold text-purple-400 uppercase" id="resultTitle">Settlement Summary</h3>
                <p id="perPersonDisplay" class="text-4xl font-extrabold text-purple-700 mt-1">₹0.00</p>
                <div id="settlementList" class="mt-4 space-y-2 text-sm font-medium"></div>

                <button id="waBtn" onclick="shareToWhatsapp()" class="hidden mt-6 w-full p-3 rounded-xl whatsapp-btn font-bold flex items-center justify-center gap-2 shadow-md hover:brightness-110">
                    Share to WhatsApp 📲
                </button>
            </section>
        </div>

        <div class="lg:col-span-2">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-lg font-bold text-slate-600">Recent Group Splits</h2>
                <button onclick="clearHistory()" class="text-xs font-bold text-red-400 hover:text-red-600 uppercase">Clear All</button>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        let currentSplit = null;

        window.onload = () => {
            updateFriendInputs();
            loadHistory();
        };

        function updateFriendInputs() {
            let count = parseInt(document.getElementById("friendCount").value);
            if (count < 1 || isNaN(count)) count = 1; // Basic safety
            
            const container = document.getElementById("friendsContainer");
            container.innerHTML = '<label class="text-xs font-bold text-slate-400 uppercase ml-1">Friend Names</label>';

            for (let i = 1; i <= count; i++) {
                const input = document.createElement("input");
                input.type = "text";
                input.placeholder = `Friend ${i} Name`;
                input.oninput = updatePayerDropdown;
                input.className = "friend-name-input w-full p-3 mb-2 rounded-lg bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-purple-300 text-sm animate-card";
                container.appendChild(input);
            }
            updatePayerDropdown();
        }

        function updatePayerDropdown() {
            const payerSelect = document.getElementById("whoPaid");
            const nameInputs = document.querySelectorAll(".friend-name-input");
            const currentValue = payerSelect.value;
            payerSelect.innerHTML = '';
            nameInputs.forEach((input, index) => {
                const name = input.value.trim() || `Friend ${index + 1}`;
                const opt = document.createElement("option");
                opt.value = name; opt.text = name;
                payerSelect.add(opt);
            });
            payerSelect.value = currentValue || payerSelect.options[0]?.value;
        }

        function splitBill() {
            const title = document.getElementById("expenseTitle").value || "Quick Split 🍕";
            const amount = parseFloat(document.getElementById("billAmount").value);
            const count = parseInt(document.getElementById("friendCount").value);
            const category = document.getElementById("category").value;
            const payer = document.getElementById("whoPaid").value;
            const nameInputs = document.querySelectorAll(".friend-name-input");

            if (isNaN(amount) || amount <= 0) { alert("Please enter a valid amount!"); return; }

            const names = Array.from(nameInputs).map((input, i) => input.value.trim() || `Friend ${i + 1}`);
            const perPerson = (amount / count).toFixed(2);
            
            let settlementHTML = "";
            let waSettlementText = "";
            let settlements = [];

            names.forEach(name => {
                if (name !== payer) {
                    const sid = 'settle-' + Math.random().toString(36).substr(2, 9);
                    settlements.push({ id: sid, from: name, to: payer, amount: perPerson, isSettled: false });
                    
                    settlementHTML += `
                    <div id="${sid}" class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm animate-card">
                        <span>${name} <span class="text-xs text-slate-400">→</span> <b>${payer}</b></span>
                        <div class="flex items-center gap-2 font-bold text-purple-600">
                            ₹${perPerson}
                            <button onclick="settleUp('${sid}')" class="p-1 px-2 bg-green-100 text-green-600 text-[10px] rounded-lg uppercase">Settle Up ✔</button>
                        </div>
                    </div>`;
                    waSettlementText += `\n• ${name} owes ${payer} ₹${perPerson}`;
                }
            });

            currentSplit = { 
                id: Date.now(), title, amount: amount.toLocaleString("en-IN"),
                perPerson, friends: count, emoji: category, payer, details: waSettlementText, 
                settlements: settlements
            };

            document.getElementById("resultTitle").innerText = title;
            document.getElementById("perPersonDisplay").innerText = `₹${perPerson}`;
            document.getElementById("settlementList").innerHTML = settlementHTML;
            document.getElementById("waBtn").classList.remove("hidden");
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            saveToHistory(currentSplit);
            updateTotalBalance();
        }

        function settleUp(id) {
            document.getElementById(id).classList.add('settled');
            let history = JSON.parse(localStorage.getItem("splitKitHistory") || "[]");
            history.forEach(split => {
                split.settlements.forEach(s => { if(s.id === id) s.isSettled = true; });
            });
            localStorage.setItem("splitKitHistory", JSON.stringify(history));
            updateTotalBalance();
        }

        function saveToHistory(split) {
            let history = JSON.parse(localStorage.getItem("splitKitHistory") || "[]");
            history.unshift(split);
            localStorage.setItem("splitKitHistory", JSON.stringify(history));
            renderHistory(history);
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem("splitKitHistory") || "[]");
            renderHistory(history);
            updateTotalBalance();
        }

        function updateTotalBalance() {
            const history = JSON.parse(localStorage.getItem("splitKitHistory") || "[]");
            let total = 0;
            history.forEach(split => {
                split.settlements.forEach(s => { if(!s.isSettled) total += parseFloat(s.amount); });
            });
            document.getElementById("totalPendingDisplay").innerText = `₹${total.toLocaleString("en-IN")}`;
        }

        function renderHistory(history) {
            const list = document.getElementById("historyList");
            if(!history.length) {
                list.innerHTML = `<div class="text-center py-20 glass-card">🍕 No expenses yet. Start splitting!</div>`;
                return;
            }
            list.innerHTML = "";
            history.forEach(item => {
                const card = document.createElement("div");
                card.className = "glass-card p-5 flex justify-between items-center animate-card border-l-4 border-purple-500";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-3xl bg-slate-100 p-2 rounded-xl">${item.emoji}</div>
                        <div>
                            <h4 class="font-bold text-slate-700">${item.title}</h4>
                            <p class="text-xs text-slate-400 uppercase font-semibold">Paid by ${item.payer} • ${item.friends} Friends</p>
                        </div>
                    </div>
                    <div class="text-right"><p class="font-black text-slate-800 text-lg">₹${item.amount}</p></div>
                `;
                list.appendChild(card);
            });
        }

        function clearHistory() {
            if(confirm("Clear all history?")) { localStorage.removeItem("splitKitHistory"); loadHistory(); }
        }

        function shareToWhatsapp() {
            if (!currentSplit) return;
            const text = `Hey! 👋\n\n*${currentSplit.title}*\nTotal bill: *₹${currentSplit.amount}*\nSplit: *₹${currentSplit.perPerson} each*\n\n*Settlements:*${currentSplit.details}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, "_blank");
        }
    </script>
</body>
</html>
